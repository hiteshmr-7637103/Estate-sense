version: '3.8'

services:
  # The Python ML Service
  ml_service:
    build: ./ml_service
    ports:
      - "8000:8000"
    networks:
      - aura-network

  # The Node.js Backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - ml_service
    networks:
      - aura-network

  # The React Frontend (Vite)
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge
