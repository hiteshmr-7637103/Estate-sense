services:
  # 1. The ML Service 
  - type: pserv
    name: estate-sense-ml
    env: docker
    dockerContext: ./ml_service
    plan: free
    region: ohio

# 2. The Backend (Public)
  - type: web
    name: estate-sense-backend
    env: docker
    dockerContext: ./backend
    plan: free
    region: ohio
    envVars:
      - key: MONGO_URI
        sync: false 
      - key: PORT
        value: 5000