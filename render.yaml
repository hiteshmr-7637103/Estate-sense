services:
  # 1. The ML Service (Private — only accessible internally)
  - type: pserv
    name: estate-sense-ml
    env: docker
    dockerContext: ./ml_service
    plan: free
    region: ohio

  # 2. The Backend (Public Web Service)
  - type: web
    name: estate-sense-backend
    env: docker
    dockerContext: ./backend
    plan: free
    region: ohio
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: "5000"
      - key: PYTHON_API_URL
        fromService:
          name: estate-sense-ml
          type: pserv
          property: hostport