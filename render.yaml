services:
  # 1. The ML Service (Python/FastAPI)
  - type: web
    name: estate-sense-ml
    env: docker
    dockerContext: ./ml_service
    plan: free
    region: ohio # Ensure all are in the same region
    property:
      private: true # This hides the ML service from the public internet!

  # 2. The Backend (Node.js)
  - type: web
    name: estate-sense-backend
    env: docker
    dockerContext: ./backend
    plan: free
    region: ohio
    envVars:
      - key: MONGO_URI
        sync: false # You will set this manually in the dashboard for security
      - key: PORT
        value: 5000

  # 3. The Frontend (React/Vite)
  - type: web
    name: estate-sense-app
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    region: ohio
    envVars:
      - key: VITE_API_URL
        value: https://estate-sense-backend.onrender.com